<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa - Cesar Augusto</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
<style>
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }
  .map-shell { flex: 1; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="brand-mark">CA</div>
    <div class="brand-name">CESAR<span class="thin"> AUGUSTO</span></div>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Início</a>
    <a class="nav-link" href="dashboard.html">Monitoramento</a>
    <a class="nav-link active" href="mapa.html">Mapa</a>
    <a class="nav-link" href="cte.html">CT-e</a>
    <a class="nav-link" href="settings.html">Configurações</a>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-clock">
    <div id="clock"></div>
    <div id="dateLabel"></div>
  </div>
  <button class="icon-btn" id="logoutBtn" title="Sair">⏻</button>
</nav>

<div class="map-shell">
  <div id="map"></div>

  <div class="map-panel">
    <div class="search-box">
      <span class="search-icon">🔎</span>
      <input id="searchInput" type="text" placeholder="Buscar Programação de Transporte...">
    </div>
    <div class="map-detail" id="detailPanel" style="display:none;"></div>
    <div class="map-detail" id="summaryPanel">
      <div class="row"><span class="k">Caminhões no mapa</span><span id="totalPoints">0</span></div>
      <div class="row"><span class="k">Última atualização</span><span id="lastUpdate">--</span></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="js/common.js"></script>
<script src="js/mapa.js"></script>
</body>
</html>
